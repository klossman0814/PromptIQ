services:
  api:
    build: ./backend
    ports:
      - "5176:5176"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
    container_name: promptiq-api

  web:
    build: .
    ports:
      - "5174:80"
    depends_on:
      - api
    container_name: promptiq-web
